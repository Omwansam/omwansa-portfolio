services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: arnold
      POSTGRES_PASSWORD: "Falcon@7ham"
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arnold -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: BACKEND/Dockerfile
    container_name: portfolio-backend
    environment:
      PORT: "5000"
      # Inside docker-compose, the DB host is the service name "db" (not localhost).
      # Password contains "@", so it must be URL-encoded as %40.
      DATABASE_URL: "postgresql://arnold:Falcon%407ham@db:5432/portfolio"
      # Optional (recommended): set these via an env file in real deployments
      # SECRET_KEY: "change-me"
      # JWT_SECRET_KEY: "change-me"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: client/my-portfolio/Dockerfile
      args:
        # Build-time injection for Vite.
        # The browser hits your host machine, so localhost:5000 is correct here.
        VITE_API_BASE_URL: "http://localhost:5000"
    container_name: portfolio-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  db_data:
